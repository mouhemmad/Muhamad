<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>المنيو</title>
<style>
@font-face{font-family:'GraphikArabic';src:url('/Graphik_Arabic_Light.woff2') format('woff2');font-weight:300}
@font-face{font-family:'GraphikArabic';src:url('/Graphik_Arabic_Medium.woff2') format('woff2');font-weight:500}
@font-face{font-family:'GraphikArabic';src:url('/Graphik_Arabic_SemiBold.woff2') format('woff2');font-weight:600}
@font-face{font-family:'GraphikArabic';src:url('/Graphik_Arabic_Bold.woff2') format('woff2');font-weight:700}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
img{max-width:100%;display:block}
body{font-family:'GraphikArabic',sans-serif;min-height:100vh;overflow-x:hidden}
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0a0a;color:#555;font-size:14px}
.error-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#111;color:#aaa;text-align:center;padding:20px}
.error-screen h2{color:#fff;margin-bottom:10px;font-size:1.2rem}

/* ── DARK THEME (default) ── */
.theme-dark{--mbg:#0a0a0a;--mbg2:#111111;--mbg3:#1a1a1a;--mfg:#f5f5f5;--mfg2:#aaa;--mfg3:#555;--mborder:#222;--macc:#ED1C24;--mcard:#111}
/* ── LIGHT THEME ── */
.theme-light{--mbg:#ffffff;--mbg2:#f5f5f5;--mbg3:#efefef;--mfg:#0a0a0a;--mfg2:#444;--mfg3:#999;--mborder:#e8e8e8;--macc:#00a99d;--mcard:#fff}
/* ── STREET THEME ── */
.theme-street{--mbg:#1a0a00;--mbg2:#220e00;--mbg3:#2d1200;--mfg:#fff8f0;--mfg2:#ffb347;--mfg3:#885500;--mborder:#3d1f00;--macc:#ff6b35;--mcard:#1f0c00}
/* ── FINE THEME ── */
.theme-fine{--mbg:#0d0d0d;--mbg2:#141414;--mbg3:#1a1a1a;--mfg:#e8e0d0;--mfg2:#c9a84c;--mfg3:#665500;--mborder:#2a2a1a;--macc:#c9a84c;--mcard:#111}
/* ── CAFE THEME ── */
.theme-cafe{--mbg:#2c1810;--mbg2:#3a2218;--mbg3:#4a2e20;--mfg:#f5e6d3;--mfg2:#d4a373;--mfg3:#8b5e3c;--mborder:#5c3828;--macc:#d4a373;--mcard:#3a2218}

.menu-wrap{background:var(--mbg);color:var(--mfg);min-height:100vh}
.m-nav{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:60px;position:sticky;top:0;z-index:100;background:var(--mbg);border-bottom:1px solid var(--mborder)}
.m-nav-logo{font-size:1.2rem;font-weight:700;color:var(--mfg);letter-spacing:-0.3px}
.m-nav-right{display:flex;align-items:center;gap:8px}
.m-nav-badge{padding:6px 14px;border-radius:50px;font-size:12px;font-weight:700;background:var(--macc);color:#fff}
.m-hero{padding:28px 20px 20px;border-bottom:1px solid var(--mborder)}
.m-hero-img{width:100%;max-height:200px;object-fit:cover;border-radius:14px;margin-bottom:16px}
.m-rest-name{font-size:1.6rem;font-weight:700;color:var(--mfg);margin-bottom:6px}
.m-social{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.m-social a{width:34px;height:34px;border-radius:50%;background:var(--mbg2);border:1px solid var(--mborder);display:flex;align-items:center;justify-content:center;color:var(--mfg2);text-decoration:none;transition:border-color .2s}
.m-social a:hover{border-color:var(--macc);color:var(--macc)}
.m-social a svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2}
.m-cats{display:flex;gap:8px;overflow-x:auto;padding:14px 20px;border-bottom:1px solid var(--mborder);scrollbar-width:none}
.m-cats::-webkit-scrollbar{display:none}
.m-cat-btn{padding:7px 16px;border-radius:50px;border:1px solid var(--mborder);background:var(--mbg2);color:var(--mfg2);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;transition:.15s}
.m-cat-btn.active{background:var(--macc);color:#fff;border-color:var(--macc)}
.m-cat-btn:hover:not(.active){border-color:var(--mfg3);color:var(--mfg)}
.m-content{padding:20px}
.m-cat-section{margin-bottom:32px}
.m-cat-title{display:flex;align-items:center;gap:8px;font-size:1rem;font-weight:700;color:var(--mfg);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--mborder)}
.m-cat-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
@media(max-width:400px){.products-grid{grid-template-columns:1fr}}
.p-card{background:var(--mcard);border:1px solid var(--mborder);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
.p-card-img{width:100%;height:160px;object-fit:cover}
.p-card-body{padding:14px;flex:1;display:flex;flex-direction:column}
.p-card-name{font-size:.95rem;font-weight:700;color:var(--mfg);margin-bottom:4px}
.p-card-desc{font-size:12px;color:var(--mfg3);line-height:1.5;flex:1}
.p-card-price{font-size:1.1rem;font-weight:700;color:var(--macc);margin-top:10px}
.m-empty{color:var(--mfg3);text-align:center;padding:40px;font-size:14px}
.m-footer{border-top:1px solid var(--mborder);padding:20px;text-align:center;color:var(--mfg3);font-size:12px}
.m-footer a{color:var(--macc);text-decoration:none}
</style>
</head>
<body>

<div id="loadingScreen" class="loading-screen">جاري التحميل...</div>
<div id="errorScreen" class="error-screen" style="display:none">
  <div><h2>غير متاح</h2><p id="errorMsg">هذا المطعم غير متاح حالياً</p></div>
</div>
<div id="menuWrap" class="menu-wrap" style="display:none"></div>

<script>
const ICON_MAP = { utensils:'🍽', coffee:'☕', leaf:'🥗', cookie:'🍪', pizza:'🍕', burger:'🍔', fish:'🐟', chicken:'🍗' };

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function loadMenu() {
  const params = new URLSearchParams(location.search);
  const username = params.get('u') || params.get('username');
  if (!username) { showError('رابط غير صحيح'); return; }

  try {
    const res = await fetch('/api/menu?u=' + encodeURIComponent(username));
    const data = await res.json();
    if (!res.ok) { showError(data.error || 'خطأ'); return; }
    renderMenu(data);
  } catch(e) {
    showError('خطأ في الاتصال');
  }
}

function showError(msg) {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('errorScreen').style.display = 'flex';
  document.getElementById('errorMsg').textContent = msg;
}

function renderMenu({ user, products, categories }) {
  document.title = user.restaurant_name + ' — المنيو';
  const theme = user.selected_theme || 'dark';
  const wrap = document.getElementById('menuWrap');
  wrap.className = 'menu-wrap theme-' + theme;

  const catsMap = {};
  categories.forEach(c => catsMap[c.slug] = c);

  const grouped = {};
  products.forEach(p => {
    if (!grouped[p.category]) grouped[p.category] = [];
    grouped[p.category].push(p);
  });

  const catKeys = categories.map(c => c.slug).filter(s => grouped[s]);
  Object.keys(grouped).forEach(k => { if (!catKeys.includes(k)) catKeys.push(k); });

  const socials = [
    { key:'social_whatsapp', icon:`<svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.71 3.41 2 2 0 0 1 3.7 1.24h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6 6l1.08-1.08a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16z"/></svg>`, href: v => 'https://wa.me/'+v.replace(/[^0-9]/g,'') },
    { key:'social_instagram', icon:`<svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>`, href: v => 'https://instagram.com/'+v.replace('@','') },
    { key:'social_tiktok', icon:`<svg viewBox="0 0 24 24"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/></svg>`, href: v => 'https://tiktok.com/@'+v.replace('@','') },
    { key:'social_snapchat', icon:`<svg viewBox="0 0 24 24"><path d="M12 2C7 2 5 5 5 8v1c-1 0-2 1-2 2s1 1.5 2 1.5c-.5 2-2 3-3 3.5 1 .5 3.5 1 5.5 1.5.5 1 1 2 2.5 2 1 0 1.5-.5 2-.5s1 .5 2 .5c1.5 0 2-1 2.5-2 2-.5 4.5-1 5.5-1.5-1-.5-2.5-1.5-3-3.5 1 0 2-.5 2-1.5s-1-2-2-2V8c0-3-2-6-7-6z"/></svg>`, href: v => 'https://snapchat.com/add/'+v.replace('@','') },
    { key:'social_facebook', icon:`<svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>`, href: v => v },
    { key:'social_location', icon:`<svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`, href: v => v },
  ].filter(s => user[s.key]);

  const socialsHtml = socials.length ? `<div class="m-social">${socials.map(s => `<a href="${esc(s.href(user[s.key]))}" target="_blank" rel="noopener">${s.icon}</a>`).join('')}</div>` : '';

  const catBtns = catKeys.map(k => {
    const c = catsMap[k] || { name: k, icon: 'utensils', color: '#8b5cf6' };
    return `<button class="m-cat-btn" onclick="scrollToSection('${k}')">${ICON_MAP[c.icon]||'🍽'} ${esc(c.name)}</button>`;
  }).join('');

  const sectionsHtml = catKeys.map(k => {
    const c = catsMap[k] || { name: k, icon: 'utensils', color: '#8b5cf6' };
    const prods = grouped[k] || [];
    return `<div class="m-cat-section" id="cat-${k}">
      <div class="m-cat-title">
        <div class="m-cat-icon" style="background:${c.color}22">${ICON_MAP[c.icon]||'🍽'}</div>
        ${esc(c.name)}
      </div>
      <div class="products-grid">${prods.map(p => `<div class="p-card">
        ${p.image_url ? `<img class="p-card-img" src="${esc(p.image_url)}" alt="${esc(p.name)}" loading="lazy">` : ''}
        <div class="p-card-body">
          <div class="p-card-name">${esc(p.name)}</div>
          ${p.description ? `<div class="p-card-desc">${esc(p.description)}</div>` : ''}
          <div class="p-card-price">${parseFloat(p.price).toFixed(2)}</div>
        </div>
      </div>`).join('')}</div>
    </div>`;
  }).join('') || '<div class="m-empty">لا يوجد منتجات بعد</div>';

  wrap.innerHTML = `
    <nav class="m-nav">
      <div class="m-nav-logo">${esc(user.restaurant_name)}</div>
      <div class="m-nav-right"><span class="m-nav-badge">المنيو</span></div>
    </nav>
    <div class="m-hero">
      ${user.hero_image ? `<img class="m-hero-img" src="${esc(user.hero_image)}" alt="hero">` : ''}
      <div class="m-rest-name">${esc(user.restaurant_name)}</div>
      ${socialsHtml}
    </div>
    ${catKeys.length > 1 ? `<div class="m-cats">${catBtns}</div>` : ''}
    <div class="m-content">${sectionsHtml}</div>
    <div class="m-footer">Powered by <a href="/">Kozhen Studio</a></div>
  `;

  document.getElementById('loadingScreen').style.display = 'none';
  wrap.style.display = 'block';
}

function scrollToSection(slug) {
  const el = document.getElementById('cat-' + slug);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

loadMenu();
</script>
</body>
</html>
