<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول — Kozhen Studio</title>
<style>
@font-face{font-family:'GraphikArabic';src:url('Graphik_Arabic_Light.woff2') format('woff2');font-weight:300}
@font-face{font-family:'GraphikArabic';src:url('Graphik_Arabic_Medium.woff2') format('woff2');font-weight:500}
@font-face{font-family:'GraphikArabic';src:url('Graphik_Arabic_SemiBold.woff2') format('woff2');font-weight:600}
@font-face{font-family:'GraphikArabic';src:url('Graphik_Arabic_Bold.woff2') format('woff2');font-weight:700}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--bg2:#141414;--fg:#f5f5f5;--fg2:#aaa;--fg3:#555;--border:#242424;--card:#111111}
body{font-family:'GraphikArabic','Tajawal',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(-45deg,#fff 0,#fff 1px,transparent 1px,transparent 40px);opacity:.015;pointer-events:none;z-index:0}
.page{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.logo-wrap{display:flex;align-items:center;gap:12px;text-decoration:none;margin-bottom:36px}
.logo-img{width:48px;height:48px;object-fit:contain;border-radius:10px}
.logo-text{font-size:1.15rem;font-weight:700;color:var(--fg);letter-spacing:-0.3px}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:36px 32px;width:100%;max-width:420px}
.card-head{margin-bottom:28px;text-align:center}
.card-icon{width:52px;height:52px;border-radius:14px;background:#1a1a1a;border:1px solid #2e2e2e;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;color:var(--fg)}
.card-icon svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:2}
.card h2{font-size:1.35rem;font-weight:700;letter-spacing:-0.4px;margin-bottom:6px}
.card-sub{color:var(--fg2);font-size:.9rem;font-weight:400}
.error-box{background:rgba(220,38,38,.12);border:1px solid rgba(220,38,38,.35);color:#f87171;padding:11px 14px;border-radius:12px;font-size:13.5px;margin-bottom:18px;display:flex;align-items:center;gap:8px;display:none}
.error-box svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
.form-group{margin-bottom:16px}
.form-group label{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:var(--fg3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.form-group label svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}
.form-group input{width:100%;background:#0d0d0d;border:1px solid var(--border);color:var(--fg);padding:13px 16px;border-radius:12px;font-size:15px;font-family:inherit;outline:none;transition:border-color .2s,background .2s}
.form-group input:focus{border-color:#666;background:#111}
.form-group input::placeholder{color:var(--fg3)}
.btn-submit{width:100%;background:#fff;color:#000;border:none;padding:14px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s,transform .15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px}
.btn-submit:hover{opacity:.88;transform:translateY(-1px)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-submit svg{width:17px;height:17px;stroke:#000;fill:none;stroke-width:2.5}
.card-footer{text-align:center;margin-top:22px;color:var(--fg2);font-size:13.5px}
.card-footer a{color:#fff;text-decoration:none;font-weight:600;border-bottom:1px solid #444}
.card-footer a:hover{border-color:#fff}
.divider{border:none;border-top:1px solid var(--border);margin:22px 0}
</style>
</head>
<body>
<div class="page">
  <a href="/" class="logo-wrap">
    <img src="kozhen-logo-dark.png" alt="Kozhen Studio" class="logo-img" style="filter:invert(1)">
    <span class="logo-text">Kozhen Studio</span>
  </a>
  <div class="card">
    <div class="card-head">
      <div class="card-icon">
        <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      </div>
      <h2>مرحباً بعودتك</h2>
      <p class="card-sub">سجّل دخولك للوصول إلى لوحة التحكم</p>
    </div>
    <div class="error-box" id="errorBox">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="errorMsg"></span>
    </div>
    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <label><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>اسم المستخدم</label>
        <input type="text" name="username" placeholder="أدخل اسم المستخدم أو البريد" required autocomplete="username">
      </div>
      <div class="form-group">
        <label><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>كلمة المرور</label>
        <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-submit" id="submitBtn">
        <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        تسجيل الدخول
      </button>
    </form>
    <hr class="divider">
    <div class="card-footer">ليس لديك حساب؟ <a href="/register">أنشئ حساباً مجاناً</a></div>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
if (API.isLoggedIn()) window.location.href = '/dashboard';
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errorBox');
  btn.disabled = true; btn.textContent = '...';
  err.style.display = 'none';
  const data = new FormData(this);
  const res = await API.post('/auth', { action: 'login', username: data.get('username'), password: data.get('password') });
  if (res && res.ok) {
    API.setToken(res.data.token);
    API.setUser(res.data.user);
    window.location.href = '/dashboard';
  } else {
    document.getElementById('errorMsg').textContent = res?.data?.error || 'خطأ في الاتصال';
    err.style.display = 'flex';
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>تسجيل الدخول';
  }
});
</script>
</body>
</html>
